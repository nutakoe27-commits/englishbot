# ─── Сети ────────────────────────────────────────────────────────────────────
networks:
  englishbot_net:
    driver: bridge

# ─── Сервисы ─────────────────────────────────────────────────────────────────
# ВАЖНО: на VPS уже запущен системный Nginx (для DocBot), который слушает 80/443.
# Поэтому Docker-nginx и Docker-certbot ОТКЛЮЧЕНЫ.
# Мы пробрасываем порты контейнеров на 127.0.0.1 VPS, а системный Nginx проксирует трафик.

services:

  # ── Backend — FastAPI (vLLM + Whisper STT + Kokoro TTS) ────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    # Все LLM/STT/TTS — self-hosted на GPU-сервере.
    # host.docker.internal нужен, чтобы бэкенд дотягивался до vLLM/Whisper/Kokoro
    # на хосте VPS (reverse SSH tunnel VPS:23333/23334/23335 -> GPU-сервер).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8082:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - englishbot_net

  # ── Bot — aiogram 3 (long polling) ───────────────────────────────────────
  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - englishbot_net

  # ── Mini App — React SPA (nginx внутри контейнера) ────────────────────────
  miniapp:
    build:
      context: ./miniapp
      args:
        # Username бота без '@' — используется в LockScreen для deep-link в /subscribe.
        # Значение впечатывается в JS-бандл на этапе build (Vite).
        VITE_BOT_USERNAME: ${BOT_USERNAME:-EnglishTutorBot}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - englishbot_net

  # ── Admin Panel — React SPA ───────────────────────────────────────────────
  admin:
    build: ./admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:80"
    networks:
      - englishbot_net

