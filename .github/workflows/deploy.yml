name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/englishbot
            git fetch origin
            git reset --hard origin/main
            if [ ! -f .env ]; then
              echo "ERROR: /var/www/englishbot/.env not found — create it manually on first deploy"
              exit 1
            fi
            docker compose pull || true
            docker compose up -d --build
            docker image prune -f
