name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/englishbot
            git fetch origin
            git reset --hard origin/main
            # Stack will be added in next steps. For now just confirm pull works.
            if [ -f docker-compose.yml ]; then
              docker compose pull || true
              docker compose up -d --build
              docker system prune -f
            else
              echo "docker-compose.yml not yet present — skipping stack restart"
            fi
