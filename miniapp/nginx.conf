server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip-сжатие статики
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # SPA fallback — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # КРИТИЧНО: index.html НЕ должен кешироваться. Иначе после нового билда
    # Telegram/браузер продолжают грузить старую страницу со ссылкой на
    # уже не существующий /assets/index-OLDHASH.js → юзер видит старую версию
    # mini app, фичи "не работают". /assets/* кешируются на год, потому что
    # Vite добавляет content-hash к именам.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Кэширование статических ассетов (Vite добавляет хеш к именам файлов).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
