<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Telegram WebView/мобильные браузеры иногда игнорируют HTTP Cache-Control
         для index.html. Дублируем no-cache в meta как страховку — иначе после
         нового билда юзер продолжает грузить старую страницу со ссылкой на
         /assets/index-OLDHASH.js, фичи «не работают». -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>AI English Tutor</title>
    <style>
      html, body { background: #0b0d12; color: #e8eaf0; margin: 0; padding: 0; }
      #boot-error {
        display: none;
        padding: 20px;
        font-family: -apple-system, monospace;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #ff8a8a;
      }
    </style>
    <script>
      // Глобальный handler — ловит синхронные ошибки на module-evaluation,
      // ДО того как React успел смонтироваться (ErrorBoundary такие не видит).
      // На iOS Safari WebKit это критично: чёрный экран без диагностики иначе.
      (function () {
        function show(text) {
          var el = document.getElementById('boot-error');
          var root = document.getElementById('root');
          if (el) {
            el.style.display = 'block';
            el.textContent = text;
          }
          if (root && !root.firstChild) {
            // Подвстраиваем сообщение и в root — на случай если оно скрыто.
            root.textContent = text;
            root.style.padding = '20px';
            root.style.fontFamily = 'monospace';
            root.style.fontSize = '13px';
            root.style.color = '#ff8a8a';
            root.style.whiteSpace = 'pre-wrap';
          }
        }
        window.addEventListener('error', function (e) {
          show('JS ERROR\n' + (e.message || '(no message)') +
               '\n@ ' + (e.filename || '?') + ':' + (e.lineno || '?') +
               '\n\n' + ((e.error && (e.error.stack || e.error.message)) || ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var reason = e.reason || {};
          show('UNHANDLED PROMISE\n' + (reason.message || String(reason)) +
               '\n\n' + (reason.stack || ''));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-error"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
