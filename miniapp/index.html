<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Telegram WebView/мобильные браузеры иногда игнорируют HTTP Cache-Control
         для index.html. Дублируем no-cache в meta как страховку — иначе после
         нового билда юзер продолжает грузить старую страницу со ссылкой на
         /assets/index-OLDHASH.js, фичи «не работают». -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>English Tutor — AI-репетитор английского с голосовой практикой</title>

    <!-- SEO / соц. превью. Абсолютные URL обязательны для og:image. -->
    <meta name="description" content="AI-репетитор английского с голосовой практикой. Разбор ошибок по-русски, подкасты под твою тему, грамматика A1–C1, словарь с интервальным повтором. Попробуй бесплатно." />
    <link rel="canonical" href="https://englishbot.krichigindocs.ru/" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="English Tutor" />
    <meta property="og:title" content="English Tutor — AI-репетитор английского с голосовой практикой" />
    <meta property="og:description" content="Заговори на английском, а не молчи. Голосовая практика с ИИ, разбор ошибок по-русски. Попробуй бесплатно." />
    <meta property="og:url" content="https://englishbot.krichigindocs.ru/" />
    <meta property="og:image" content="https://englishbot.krichigindocs.ru/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="English Tutor — AI-репетитор английского" />
    <meta name="twitter:description" content="Заговори на английском, а не молчи. Голосовая практика с ИИ, разбор ошибок по-русски." />
    <meta name="twitter:image" content="https://englishbot.krichigindocs.ru/og-cover.png" />

    <!-- Иконки. SVG — для современных браузеров (масштабируется). PNG/ICO
         fallback для старых. apple-touch-icon — для iOS «На главный экран».
         site.webmanifest — для PWA / Android Chrome / theme color. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#5C7050" />

    <!-- lucide-icons CDN: рендерит SVG-иконки из <i data-lucide="name"/>.
         После каждого React-commit нужно вызвать window.lucide.createIcons(),
         см. src/lucide.ts useLucide hook. -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Yandex.Metrika counter — стоит на всех страницах SPA, т.к. index.html
         один. Доп. цели (subscription_paid и т.п.) шлём через window.ym из
         кода — см. miniapp/src/metrika.ts. -->
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=109924904', 'ym');

        ym(109924904, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <!-- (noscript-fallback опущен: это SPA, без JS экран всё равно не рендерится.) -->
    <!-- /Yandex.Metrika counter -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
