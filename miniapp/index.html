<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Telegram WebView/мобильные браузеры иногда игнорируют HTTP Cache-Control
         для index.html. Дублируем no-cache в meta как страховку — иначе после
         нового билда юзер продолжает грузить старую страницу со ссылкой на
         /assets/index-OLDHASH.js, фичи «не работают». -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>AI English Tutor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
