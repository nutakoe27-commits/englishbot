# Admin Panel — admin-english.krichigindocs.ru → контейнер admin (порт 8083)
server {
    listen 80;
    listen [::]:80;
    server_name admin-english.krichigindocs.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin-english.krichigindocs.ru;

    ssl_certificate /etc/letsencrypt/live/admin-english.krichigindocs.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin-english.krichigindocs.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Защита админки: X-Frame-Options DENY (не встраивать в iframe)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
