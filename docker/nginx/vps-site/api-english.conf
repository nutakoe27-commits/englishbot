# Backend API + WebSocket — api-english.krichigindocs.ru → контейнер backend (порт 8082)
server {
    listen 80;
    listen [::]:80;
    server_name api-english.krichigindocs.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-english.krichigindocs.ru;

    ssl_certificate /etc/letsencrypt/live/englishbot.krichigindocs.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/englishbot.krichigindocs.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Лимиты для аудио-чанков
    client_max_body_size 20m;

    # WebSocket: /ws/*
    location /ws/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Listening — генерация подкастов. LLM до 60 сек + Kokoro TTS до 2-3 мин
    # для 10-15-минутного аудио. Дефолтный nginx 60s рубит запрос.
    location /api/listening/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Internal-эндпоинты bot↔backend: только из docker-сети, никогда не наружу.
    # Защищены X-Bot-Secret, но nginx тоже отрезает на всякий случай.
    location /api/internal/ {
        return 404;
    }

    # Обычные HTTP-запросы
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
