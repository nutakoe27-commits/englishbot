# ─────────────────────────────────────────────────────────────────────────────
# Nginx — главный конфиг для AI English Tutor
#
# Поддомены:
#   englishbot.krichigindocs.ru      → Mini App (miniapp:80)
#   api-english.krichigindocs.ru     → Backend FastAPI (backend:8000)
#   admin-english.krichigindocs.ru   → Admin Panel (admin:80)
#
# Первый запуск (получить сертификаты):
#   bash docker/nginx/init-letsencrypt.sh
#
# После получения сертификатов контейнер certbot автоматически обновляет их
# каждые 12 часов (certbot renew --webroot).
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Заголовки безопасности (глобально) ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP → HTTPS редирект + ACME challenge (Let's Encrypt webroot)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name
            englishbot.krichigindocs.ru
            api-english.krichigindocs.ru
            admin-english.krichigindocs.ru;

        # ACME challenge для certbot (webroot mode)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Всё остальное → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Mini App: englishbot.krichigindocs.ru
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name englishbot.krichigindocs.ru;

        ssl_certificate     /etc/letsencrypt/live/englishbot.krichigindocs.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/englishbot.krichigindocs.ru/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass         http://miniapp:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Backend API: api-english.krichigindocs.ru
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api-english.krichigindocs.ru;

        ssl_certificate     /etc/letsencrypt/live/api-english.krichigindocs.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-english.krichigindocs.ru/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # REST API
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Healthcheck
        location /health {
            proxy_pass         http://backend:8000;
            proxy_set_header   Host $host;
        }

        # WebSocket — голосовой диалог с Gemini Live
        location /ws/ {
            proxy_pass          http://backend:8000;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Admin Panel: admin-english.krichigindocs.ru
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name admin-english.krichigindocs.ru;

        ssl_certificate     /etc/letsencrypt/live/admin-english.krichigindocs.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin-english.krichigindocs.ru/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass         http://admin:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
